syntax = "proto3";
package analysis_service;

import "proto/vendored/macondo/macondo.proto";

// Request to claim next available job
message ClaimJobRequest {
  // Worker authenticates via X-Api-Key header (existing middleware)
  string macondo_version = 1; // Worker reports its version; rejected if too old
}

// Response with job details or no_jobs flag
message ClaimJobResponse {
  bool no_jobs = 1;

  // Job details (populated if no_jobs = false)
  string job_id = 2;
  string game_id = 3;
  AnalysisConfig config = 4;
}

// Analysis configuration
message AnalysisConfig {
  int32 sim_plays_early_mid = 1;
  int32 sim_plies_early_mid = 2;
  int32 sim_stop_early_mid = 3;

  int32 sim_plays_early_preendgame = 4;
  int32 sim_plies_early_preendgame = 5;
  int32 sim_stop_early_preendgame = 6;

  bool peg_early_cutoff = 7;
  int32 threads = 8;
}

// Heartbeat to keep job alive
message HeartbeatRequest {
  string job_id = 1;

  // Optional progress info
  int32 current_turn = 2;
  int32 total_turns = 3;
}

message HeartbeatResponse {
  bool continue = 1; // false if job was reclaimed
}

// Submit completed analysis
message SubmitResultRequest {
  string job_id = 1;

  // Deprecated: raw protojson bytes; use result field instead
  bytes result_proto = 2;

  string macondo_version = 3;
  macondo.GameAnalysisResult result = 4; // Typed result (v2+)
}

message SubmitResultResponse {
  bool accepted = 1;
  string error = 2;          // Populated if accepted = false
  string expected_version = 3; // Populated if rejected due to version mismatch
}

// Request to report a job as permanently failed (e.g. corrupted game data)
message FailJobRequest {
  string job_id = 1;
  string error_message = 2;
  string macondo_version = 3;
}

message FailJobResponse {
  bool accepted = 1;
}

service AnalysisQueueService {
  // ClaimJob atomically claims next available job
  rpc ClaimJob(ClaimJobRequest) returns (ClaimJobResponse);

  // Heartbeat keeps job from being reclaimed due to timeout
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);

  // SubmitResult submits completed analysis
  rpc SubmitResult(SubmitResultRequest) returns (SubmitResultResponse);

  // FailJob reports a job as permanently failed due to unrecoverable data corruption
  rpc FailJob(FailJobRequest) returns (FailJobResponse);
}

// Admin-only analysis service
service AnalysisAdminService {
  // GetAdminStats returns overview statistics for the analysis system
  rpc GetAdminStats(GetAdminStatsRequest) returns (GetAdminStatsResponse);

  // ListAnalyzedGames returns a paginated list of completed analysis jobs
  rpc ListAnalyzedGames(ListAnalyzedGamesRequest) returns (ListAnalyzedGamesResponse);

  // RequeueAnalysis resets an analysis job back to pending for re-processing
  rpc RequeueAnalysis(RequeueAnalysisRequest) returns (RequeueAnalysisResponse);
}

// User-facing analysis service
service AnalysisService {
  // RequestAnalysis requests analysis for a completed game
  rpc RequestAnalysis(RequestAnalysisRequest) returns (RequestAnalysisResponse);

  // GetAnalysisStatus gets status of an analysis job
  rpc GetAnalysisStatus(GetAnalysisStatusRequest) returns (GetAnalysisStatusResponse);

  // GetAnalysisResult gets the completed analysis result
  rpc GetAnalysisResult(GetAnalysisResultRequest) returns (GetAnalysisResultResponse);

  // GetGamesAnalysisStatus returns which of the given game IDs have completed analysis
  rpc GetGamesAnalysisStatus(GetGamesAnalysisStatusRequest) returns (GetGamesAnalysisStatusResponse);
}

// Request analysis for a game
message RequestAnalysisRequest {
  string game_id = 1;
  bool force = 2; // Re-analyze even if completed (only allowed for legacy v0 results)
}

message RequestAnalysisResponse {
  // Status of the request
  enum Status {
    SUCCESS = 0;           // Analysis queued successfully
    ALREADY_REQUESTED = 1; // Analysis already requested/exists for this game
    GAME_NOT_ENDED = 2;    // Game hasn't ended yet
    NOT_A_PLAYER = 3;      // Requester is not a player in this game
    RATE_LIMITED = 4;      // User has exceeded daily limit
    INVALID_VARIANT = 5;   // Game variant not supported
  }

  Status status = 1;
  string message = 2;       // Human-readable message

  // If successful or already requested:
  string job_id = 3;        // Analysis job ID
  int32 queue_position = 4; // Position in queue (0 if processing/completed)
}

// Get status of an analysis
message GetAnalysisStatusRequest {
  string game_id = 1;
}

message GetAnalysisStatusResponse {
  enum JobStatus {
    NOT_FOUND = 0;   // No analysis job exists
    PENDING = 1;     // Waiting in queue
    PROCESSING = 2;  // Currently being analyzed
    COMPLETED = 3;   // Analysis complete
    FAILED = 4;      // Analysis failed
  }

  JobStatus status = 1;
  string job_id = 2;
  int32 queue_position = 3;  // Position in queue (0 if not pending)
  string error_message = 4;  // If failed
  int32 analysis_version = 5; // 0 = legacy (v1), 2 = enriched; only set when COMPLETED
}

// Get analysis result
message GetAnalysisResultRequest {
  string game_id = 1;
}

message GetAnalysisResultResponse {
  bool found = 1;
  bytes result_proto = 2;                // Deprecated: raw bytes for backward compat
  macondo.GameAnalysisResult result = 3; // Typed result
}

// Admin service messages

message GetAdminStatsRequest {}

message LeaderboardEntry {
  string username = 1;
  int32 analysis_count = 2;
}

message GetAdminStatsResponse {
  int32 total_completed = 1;
  int32 pending_count = 2;
  int32 processing_count = 3;
  repeated LeaderboardEntry leaderboard = 4;
  repeated LeaderboardEntry contributors = 5;
}

message ListAnalyzedGamesRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message AnalyzedGameSummary {
  string job_id = 1;
  string game_id = 2;
  int64 created_at_ms = 3;   // Unix milliseconds
  int64 completed_at_ms = 4; // Unix milliseconds
  string request_type = 5;
  string requested_by_username = 6;
  int64 claimed_at_ms = 7;   // Unix milliseconds
}

message ListAnalyzedGamesResponse {
  repeated AnalyzedGameSummary games = 1;
  int32 total = 2;
}

message RequeueAnalysisRequest {
  string game_id = 1;
}

message RequeueAnalysisResponse {
  string job_id = 1;
  int32 queue_position = 2;
}

message GetGamesAnalysisStatusRequest {
  repeated string game_ids = 1;
}

message GetGamesAnalysisStatusResponse {
  repeated string analyzed_game_ids = 1;
}
